<script>
    function printProgress() {
        var start = new Date(2021, 7 - 1, 5);
        var end = new Date(2023, 1 - 1, 4);
        var today = new Date();
        
        var total = end - start;
        var progress = today - start;
        var percent = Math.min(100, progress / total * 100);

        if (percent < 100) {
            document.getElementById("progress").innerHTML = "Until ETS: " + percent.toFixed(5) + "% done!";
        }
        else {
            document.getElementById("progress").innerHTML = "Finally I ETSed !!!";
        }
        
    }
    printProgress();
    setInterval(printProgress, 500);
</script>
